<!DOCTYPE html>
<head>
    <title>MyOwnShop/Login</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link rel="stylesheet" href="CSS/index.css"/>
</head>

<body>

    <div class="principal">

        <h1 class="titulo">My Own Shop</h1>
        
        <p class="subtitulo">Bienvenido, inicie sesión</p>
        
        <form class="login" action="JSP/Login.jsp" method="post">

            <div class="campo">
                <label>Usuario</label>
                <input type="text" name="user">
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" name="password">
            </div>

            <a href="HTMLs/IHome.html" style="text-decoration: none;">
                <input class="boton" type="submit" value="Validar" name="valida">
            </a>

        </form>

    </div>

</body>
</html>
